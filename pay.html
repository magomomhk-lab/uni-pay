<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UNI Pay</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a12;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 16px;
        }
        .container {
            max-width: 380px;
            width: 100%;
            background: #12121f;
            border-radius: 36px;
            padding: 28px 20px 30px;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .logo {
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(135deg, #a78bfa, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .badge {
            background: rgba(255,255,255,0.04);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            color: rgba(255,255,255,0.3);
            border: 1px solid rgba(255,255,255,0.04);
        }
        .card {
            background: linear-gradient(145deg, #1c1c34, #15152a);
            border-radius: 24px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.05);
            margin-bottom: 24px;
        }
        .card .bank {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }
        .card .bank .icon {
            width: 32px;
            height: 32px;
            background: #21a038;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 14px;
        }
        .card .bank .name {
            color: rgba(255,255,255,0.4);
            font-size: 14px;
        }
        .card .recipient {
            color: #f0f0ff;
            font-size: 18px;
            font-weight: 600;
        }
        .card .number {
            color: rgba(255,255,255,0.25);
            font-size: 14px;
            letter-spacing: 1px;
            margin-top: 4px;
            font-family: monospace;
        }
        .amount-section {
            margin-bottom: 24px;
        }
        .amount-section label {
            color: rgba(255,255,255,0.3);
            font-size: 13px;
            display: block;
            margin-bottom: 8px;
        }
        .amount-section .input-wrap {
            position: relative;
        }
        .amount-section .input-wrap span {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255,255,255,0.2);
            font-weight: 500;
        }
        .amount-section input {
            width: 100%;
            padding: 16px 20px 16px 44px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 20px;
            color: white;
            font-size: 28px;
            font-weight: 600;
            outline: none;
        }
        .amount-section input:focus {
            border-color: #7c3aed;
        }
        .presets {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }
        .presets .chip {
            flex: 1;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.04);
            border-radius: 30px;
            padding: 10px 0;
            text-align: center;
            color: rgba(255,255,255,0.4);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
        }
        .presets .chip:active {
            background: rgba(124,58,237,0.15);
            border-color: rgba(124,58,237,0.3);
            color: #a78bfa;
        }
        .btn {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 60px;
            background: linear-gradient(135deg, #7c3aed, #6d28d9);
            color: white;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }
        .btn:active {
            transform: scale(0.97);
        }
        .btn:disabled {
            opacity: 0.4;
        }
        .status {
            margin-top: 16px;
            text-align: center;
            font-size: 14px;
            color: rgba(255,255,255,0.15);
            min-height: 24px;
        }
        .status.success { color: #6ee7b7; }
        .status.error { color: #f87171; }
        .footer {
            margin-top: 20px;
            text-align: center;
            color: rgba(255,255,255,0.06);
            font-size: 11px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <span class="logo">UNI Pay</span>
        <span class="badge">🔒 Secure</span>
    </div>

    <div class="card">
        <div class="bank">
            <div class="icon">СБ</div>
            <span class="name">СберБанк</span>
        </div>
        <div class="recipient">Эсли</div>
        <div class="number">4081 7810 5603 2434 6396</div>
    </div>

    <div class="amount-section">
        <label>Сумма перевода (₽)</label>
        <div class="input-wrap">
            <span>₽</span>
            <input type="number" id="amount" placeholder="0" min="1" step="1">
        </div>
        <div class="presets">
            <div class="chip" data-value="500">500</div>
            <div class="chip" data-value="1000">1 000</div>
            <div class="chip" data-value="2500">2 500</div>
            <div class="chip" data-value="5000">5 000</div>
        </div>
    </div>

    <button class="btn" id="sendBtn">Перевести</button>
    <div class="status" id="status"></div>
    <div class="footer">UNI Agency • Защищено Telegram</div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();

    const amountInput = document.getElementById('amount');
    const sendBtn = document.getElementById('sendBtn');
    const status = document.getElementById('status');

    // Пресеты
    document.querySelectorAll('.chip').forEach(chip => {
        chip.addEventListener('click', () => {
            amountInput.value = chip.dataset.value;
            amountInput.dispatchEvent(new Event('input'));
        });
    });

    sendBtn.addEventListener('click', () => {
        const sum = parseInt(amountInput.value);
        if (!sum || sum < 1) {
            status.textContent = '❌ Введите корректную сумму';
            status.className = 'status error';
            return;
        }

        sendBtn.disabled = true;
        status.textContent = '⏳ Отправка...';
        status.className = 'status';

        // Отправка в бот
        tg.sendData(JSON.stringify({
            action: 'pay_done',
            sum: sum,
            type: 'prepay',
            user_id: tg.initDataUnsafe?.user?.id || 0,
            username: tg.initDataUnsafe?.user?.username || ''
        }));

        setTimeout(() => {
            status.textContent = '✅ Платёж отправлен на подтверждение';
            status.className = 'status success';
            setTimeout(() => tg.close(), 1200);
        }, 800);
    });

    amountInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') sendBtn.click();
    });
</script>
</body>
</html>
